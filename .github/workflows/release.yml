name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: "Create GitHub Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write

    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v5.0.0"
        with:
          fetch-depth: 0 # full history for changelog

      - name: "Get version from tag"
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: "Verify manifest version matches tag"
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/candy/manifest.json'))['version'])")
          TAG_VERSION=${{ steps.version.outputs.version }}
          echo "manifest: $MANIFEST_VERSION  tag: $TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: manifest.json has $MANIFEST_VERSION but tag is $TAG_VERSION"
            exit 1
          fi
          echo "✅ Versions match: $MANIFEST_VERSION"

      - name: "Create release zip"
        run: |
          cd custom_components
          zip -r ../candy-${{ steps.version.outputs.version }}.zip candy/
          cd ..
          echo "Created candy-${{ steps.version.outputs.version }}.zip"

      - name: "Generate changelog"
        id: changelog
        uses: "mikepenz/release-changelog-builder-action@v5"
        with:
          configuration: ".github/changelog_config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create GitHub Release"
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: ${{ github.ref_name }}
          name: "Candy ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.changelog }}
          files: candy-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
